services:
  # ── MLflow Tracking Server ──────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "${MLFLOW_PORT:-5001}:5001"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # ── Data Preparation (one-shot) ─────────────
  prepare-data:
    build: .
    command: python scripts/seed_postgres_from_csv.py --prepare
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MLFLOW_TRACKING_URI: http://mlflow:5001
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      - mlflow
    profiles:
      - prepare

  # ── Training (one-shot) ─────────────────────
  training:
    build: .
    command: >
      python -m app.training.train_with_mlflow
      --tracking-uri http://mlflow:5001
      --register-model
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MLFLOW_TRACKING_URI: http://mlflow:5001
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      - mlflow
    profiles:
      - train

  # ── FastAPI ─────────────────────────────────
  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port ${API_PORT:-8000}
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MLFLOW_TRACKING_URI: http://mlflow:5001
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - mlflow
    restart: unless-stopped

  # ── Streamlit Frontend ──────────────────────
  frontend:
    build: .
    command: >
      streamlit run app/frontend/streamlit_app.py
      --server.port ${STREAMLIT_PORT:-8501}
      --server.address 0.0.0.0
    env_file: .env
    environment:
      PYTHONPATH: /app
      API_BASE_URL: http://api:${API_PORT:-8000}
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ROLLING_CSV_PATH: /app/data/prepared_rolling_dataset.csv
    ports:
      - "${STREAMLIT_PORT:-8501}:${STREAMLIT_PORT:-8501}"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      - api
    restart: unless-stopped

  # ── Batch Scheduler ─────────────────────────
  batch-scheduler:
    build: .
    command: python -m app.batch.scheduler
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BATCH_INTERVAL_SECONDS: ${BATCH_INTERVAL_SECONDS:-300}
      BATCH_LIMIT: ${BATCH_LIMIT:-100}
      BATCH_MODEL_VERSION: ${BATCH_MODEL_VERSION:-docker-catboost-v1}
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped
    profiles:
      - batch

volumes:
  mlflow_data: