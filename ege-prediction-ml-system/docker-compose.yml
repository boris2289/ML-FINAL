version: "3.9"

# ══════════════════════════════════════════════════════════════
#  Все сервисы читают параметры из .env.
#  Новый эксперимент = правите .env → docker compose up.
# ══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ege_predictions}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_tables.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ege_predictions}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MLflow Tracking Server ──────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow

  # ── Data Preparation (one-shot) ─────────────
  prepare-data:
    build: .
    command: python scripts/seed_postgres_from_csv.py --prepare
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: postgres
      MLFLOW_TRACKING_URI: http://mlflow:5001
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - prepare

  # ── Training (one-shot) ─────────────────────
  training:
    build: .
    command: python -m app.training.train_with_mlflow --register-model
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: postgres
      MLFLOW_TRACKING_URI: http://mlflow:5001
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    profiles:
      - train

  # ── FastAPI ─────────────────────────────────
  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port ${API_PORT:-8000}
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: postgres
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit Frontend ──────────────────────
  frontend:
    build: .
    command: streamlit run app/frontend/streamlit_app.py --server.port ${STREAMLIT_PORT:-8501} --server.address 0.0.0.0
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: postgres
      API_BASE_URL: http://api:${API_PORT:-8000}
    ports:
      - "${STREAMLIT_PORT:-8501}:${STREAMLIT_PORT:-8501}"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      - api
    restart: unless-stopped

  # ── Batch Scheduler ─────────────────────────
  batch-scheduler:
    build: .
    command: python -m app.batch.scheduler
    env_file: .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: postgres
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - batch

volumes:
  postgres_data:
  mlflow_data:
